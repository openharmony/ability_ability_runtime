{
    "jobs" : [
        {
            "name" : "services:aimgr",
            "cmds" : [
                "mkdir /data/service/el1/public/database/aimgr 02770 aimgr ddms",
                "mkdir /data/service/el1/public/database/aimgr/cli_tool 02770 aimgr ddms"
            ]
        }
    ],
    "services" : [{
            "name" : "aimgr",
            "path" : ["/system/bin/sa_main", "/system/profile/aimgr.json"],
            "uid" : "aimgr",
            "gid" : ["system"],
            "ondemand" : true,
            "cgroup" : true,
            "caps" : ["KILL"],
            "secon" : "u:r:aimgr:s0",
            "jobs" : {
                "on-start" : "services:aimgr"
            },
            "permission" : [
                "ohos.permission.GET_BUNDLE_INFO_PRIVILEGED",
                "ohos.permission.MANAGE_TOOL_TOKENID",
                "ohos.permission.RUNNING_STATE_OBSERVER"
            ],
            "permission_acls" : [
                "ohos.permission.MANAGE_TOOL_TOKENID"
            ]
        }
    ]
}